<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#B85C38">

  <!-- Canonical -->
  <link rel="canonical" href="https://gachafruit.com/originals/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gachafruit.com/originals/">
  <meta property="og:title" content="Originals — Gachafruit Studio">
  <meta property="og:description" content="Current projects, studio journal, and curated Etsy listings from Gachafruit Studio.">
  <meta property="og:image" content="https://gachafruit.com/assets/images/gallery-hero.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Originals — Gachafruit Studio">
  <meta name="twitter:description" content="Current projects, studio journal, and curated Etsy listings from Gachafruit Studio.">
  <meta name="twitter:image" content="https://gachafruit.com/assets/images/gallery-hero.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Gachafruit Studio",
    "url": "https://gachafruit.com",
    "logo": "https://gachafruit.com/assets/images/gachafruit-logo.png",
    "sameAs": [
      "https://www.etsy.com/shop/Gachafruit",
      "https://www.instagram.com/gachafruitstudio/",
      "https://www.facebook.com/GachafruitStudio/"
    ]
  }

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/card.css">
  <link rel="stylesheet" href="../css/components/footer.css">

  <style>
    /* ============================================================
       Originals page — page-specific styles
       ============================================================ */

    /* ---- Shared section chrome ---- */
    .originals-section {
      padding-block: var(--space-2xl);
    }

    .originals-section + .originals-section {
      border-top: 1px solid var(--color-border-soft);
    }

    .originals-section:last-child {
      padding-bottom: var(--space-3xl);
    }

    .section-label {
      display: block;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-sm);
    }

    .section-heading {
      font-size: clamp(var(--font-size-xl), 2.5vw, var(--font-size-3xl));
      font-weight: var(--font-weight-black);
      letter-spacing: -0.02em;
      color: var(--color-text);
      margin-bottom: var(--space-xl);
    }

    /* ============================================================
       Section 1 — Current Project
       ============================================================ */

    /* Two-column on tablet+, stacked on mobile */
    .current-project-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-xl);
    }

    @media (min-width: 768px) {
      .current-project-layout {
        grid-template-columns: 55fr 45fr;
        gap: var(--space-2xl);
        align-items: start;
      }
    }

    /* Image gallery */
    .project-gallery__main {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: var(--radius-lg);
      background-color: var(--color-surface);
    }

    .project-gallery__main.img-placeholder {
      aspect-ratio: 4 / 3;
      border-radius: var(--radius-lg);
    }

    .project-gallery__thumbs {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      flex-wrap: wrap;
    }

    .project-gallery__thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color var(--transition-fast);
    }

    .project-gallery__thumb--active,
    .project-gallery__thumb:hover,
    .project-gallery__thumb:focus-visible {
      border-color: var(--color-accent);
      outline: none;
    }

    /* Project text content */
    .project-content__subtitle {
      display: block;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-sm);
    }

    .project-content__title {
      font-size: clamp(var(--font-size-2xl), 3.5vw, var(--font-size-4xl));
      font-weight: var(--font-weight-black);
      letter-spacing: -0.03em;
      line-height: var(--line-height-tight);
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    .project-content__date {
      font-size: var(--font-size-sm);
      color: var(--color-muted-light);
      margin-bottom: var(--space-lg);
    }

    .project-content__body {
      font-size: var(--font-size-base);
      color: var(--color-muted);
      line-height: var(--line-height-base);
      margin-bottom: var(--space-xl);
      max-width: 56ch;
    }

    .project-content__body p + p {
      margin-top: var(--space-md);
    }

    /* Archive button */
    .archive-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-muted);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      transition:
        color var(--transition-fast),
        border-color var(--transition-fast),
        background-color var(--transition-fast);
    }

    .archive-link::after {
      content: '→';
      font-size: 0.85em;
    }

    .archive-link:hover {
      color: var(--color-accent);
      border-color: var(--color-accent);
      background-color: var(--color-accent-soft);
    }

    /* Placeholder (no active project) */
    .project-placeholder {
      padding: var(--space-3xl) 0 var(--space-xl);
    }

    .project-placeholder > p {
      font-size: var(--font-size-base);
      color: var(--color-muted-light);
      margin-bottom: var(--space-xl);
    }

    /* ============================================================
       Section 2 — Etsy Preview
       ============================================================ */

    /* Bleed to edges on mobile for the scroll rail */
    .etsy-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-inline: calc(-1 * var(--space-lg));
      padding-inline: var(--space-lg);
      padding-bottom: var(--space-sm);
    }

    .etsy-scroll-wrapper::-webkit-scrollbar {
      display: none;
    }

    .etsy-scroll-track {
      display: flex;
      gap: var(--space-md);
      width: max-content;
    }

    /* Fixed card width inside the scroll rail */
    .etsy-scroll-track .product-card {
      width: 196px;
      flex-shrink: 0;
    }

    @media (min-width: 480px) {
      .etsy-scroll-track .product-card { width: 220px; }
    }

    @media (min-width: 768px) {
      .etsy-scroll-track .product-card { width: 240px; }
    }

    .section-cta {
      margin-top: var(--space-xl);
    }

    /* Inline btn--outline (mirrors card.css) */
    .btn--outline {
      display: inline-flex;
      align-items: center;
      padding: var(--space-sm) var(--space-lg);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      background: transparent;
      transition:
        border-color var(--transition-fast),
        color var(--transition-fast),
        background-color var(--transition-fast);
    }

    .btn--outline:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background-color: var(--color-accent-soft);
    }

    /* ============================================================
       Section 3 — Free Models
       ============================================================ */

    /* Mobile-first 2-col grid */
    .free-models-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }

    @media (min-width: 640px) {
      .free-models-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .free-models-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* ---- Empty / loading state ---- */
    .empty-state {
      padding: var(--space-2xl);
      text-align: center;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      color: var(--color-muted);
      font-size: var(--font-size-sm);
    }
  </style>
</head>
<body>

  <!-- ======================================================
       Header
       ====================================================== -->

    <div class="header-logo-row">
      <a href="/" class="logo" aria-label="Gachafruit home">

        <span class="logo__text">
          <span class="logo__name">Gachafruit</span>
          <span class="logo__sub">Studio</span>
        </span>
      </a>

      <button class="hamburger"
              aria-label="Toggle menu"
              aria-expanded="false"
              aria-controls="mobile-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Desktop nav -->
    <nav class="header-nav" aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="/originals/"  class="nav-link nav-link--active" aria-current="page">Originals</a></li>
        <li><a href="/#studio"     class="nav-link">The Studio</a></li>
        <li><a href="/heritage/"   class="nav-link">Heritage</a></li>
      </ul>
    </nav>

    <!-- Mobile nav drawer -->
    <nav class="mobile-nav" id="mobile-nav" aria-hidden="true" aria-label="Mobile navigation">
      <ul class="mobile-nav-list">
        <li><a href="/originals/"  class="nav-link" aria-current="page">Originals</a></li>
        <li><a href="/#studio"     class="nav-link">The Studio</a></li>
        <li><a href="/heritage/"   class="nav-link">Heritage</a></li>
      </ul>
    </nav>

  </header>

  <!-- ======================================================
       Main
       ====================================================== -->
  <main>

    <!-- ---- Section 1: Current Project ---- -->
    <section class="originals-section" aria-labelledby="current-project-label">
      <div class="inner">
        <span class="section-label" id="current-project-label">Current Project</span>
        <div id="current-project">
          <!-- Populated by js/components/originals-page.js -->
        </div>
      </div>
    </section>

    <!-- ---- Section 2: Etsy Preview ---- -->
    <section class="originals-section" id="originals-etsy" aria-labelledby="etsy-heading">
      <div class="inner">
        <span class="section-label" id="etsy-eyebrow">GACHAFRUIT ON ETSY</span>
        <h2 class="section-heading" id="etsy-heading">Shop Our Originals</h2>
        <div class="etsy-scroll-wrapper">
          <div class="etsy-scroll-track" id="etsy-scroll-track">
            <!-- Populated by js/components/originals-page.js -->
          </div>
        </div>
        <div class="section-cta">
          <a href="/explore-all/" class="btn btn--outline" id="etsy-see-all">See All</a>
        </div>
      </div>
    </section>

    <!-- ---- Section 3: Free Models ---- -->
    <section class="originals-section" id="free-models" aria-labelledby="free-models-heading">
      <div class="inner">
        <span class="section-label">FREE MODELS</span>
        <h2 class="section-heading" id="free-models-heading">Browse the Community Archive</h2>
        <div class="free-models-grid" id="free-models-grid">
          <!-- Populated by js/components/originals-page.js -->
        </div>
      </div>
    </section>

  </main>

  <!-- ======================================================
       Footer
       ====================================================== -->
  <footer class="site-footer">
    <div class="footer-inner">

      <p class="footer-copy">
        &copy; 2026 <strong>Gachafruit</strong> &middot; Tulsa, Oklahoma
      </p>

      <nav class="footer-links" aria-label="Marketplace links">
        <a href="https://www.etsy.com/shop/Gachafruit" class="footer-link">Etsy</a>
        <a href="#" class="footer-link">Amazon</a>
      </nav>

      <div class="footer-right">
        <nav class="footer-social" aria-label="Social links">
          <a href="https://www.instagram.com/gachafruitstudio" class="footer-social__link">Instagram</a>
          <a href="https://www.youtube.com/@GachafruitStudio"  class="footer-social__link">YouTube</a>
        </nav>

        <form class="footer-newsletter" aria-label="Newsletter signup">
          <label for="newsletter-email" class="sr-only">Email address</label>
          <input
            type="email"
            id="newsletter-email"
            name="email"
            class="newsletter-input"
            placeholder="Email address"
            autocomplete="email"
          >
          <button type="submit" class="newsletter-btn">Sign Up</button>
        </form>
      </div>

    </div>
  </footer>

  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/card-builder.js" defer></script>
  <script src="../js/components/originals-page.js" defer></script>

</body>
