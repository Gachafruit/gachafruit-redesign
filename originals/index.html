  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Originals — Gachafruit Studio">

  <meta name="twitter:image" content="https://gachafruit.com/assets/images/gallery-hero.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Gachafruit Studio",
    "url": "https://gachafruit.com",

    "sameAs": [
      "https://www.etsy.com/shop/Gachafruit",

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/card.css">
  <link rel="stylesheet" href="../css/components/footer.css">

  <style>
    /* ============================================================
       Originals page — split editorial layout
       ============================================================ */

    /* ============================================================
       Page-level two-column split
       Mobile: single column stack
       Desktop (1024px+): Current Project left | Rail right
       ============================================================ */

    .originals-desktop-layout {
      max-width: var(--max-width);
      margin-inline: auto;
      padding: var(--space-2xl) var(--space-lg) var(--space-3xl);
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-2xl);
      align-items: start;
    }

    @media (min-width: 1024px) {
      .originals-desktop-layout {
        grid-template-columns: 3fr 2fr;
        gap: var(--space-3xl);
        padding-block: var(--space-3xl);
      }
    }

    /* ============================================================
       Shared: eyebrow label
       ============================================================ */

    .section-label {
      display: block;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-xs);
    }

    /* ============================================================
       Left column — Current Project (editorial feature)
       ============================================================ */

    /* The JS builds .current-project-layout with gallery + content.
       Override it to stack vertically — page layout handles the column split. */
    .current-project-layout {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    /* Main gallery image: wide, fills left column */
    .project-gallery__main {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--radius-lg);
      background-color: var(--color-surface);
    }

    .project-gallery__main.img-placeholder {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-lg);
    }

    /* Thumbnail strip */
    .project-gallery__thumbs {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      flex-wrap: wrap;
    }

    .project-gallery__thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color var(--transition-fast);
    }

    .project-gallery__thumb--active,
    .project-gallery__thumb:hover,
    .project-gallery__thumb:focus-visible {
      border-color: var(--color-accent);
      outline: none;
    }

    /* Text content block */
    .project-content {
      display: flex;
      flex-direction: column;
    }

    .project-content__subtitle {
      display: block;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-sm);
    }

    /* Large editorial title — constrained by left column width, not full viewport */
    .project-content__title {
      font-size: clamp(var(--font-size-xl), 3vw, var(--font-size-4xl));
      font-weight: var(--font-weight-black);
      letter-spacing: -0.03em;
      line-height: var(--line-height-tight);
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    .project-content__date {
      font-size: var(--font-size-sm);
      color: var(--color-muted-light);
      margin-bottom: var(--space-md);
    }

    .project-content__body {
      font-size: var(--font-size-base);
      color: var(--color-muted);
      line-height: var(--line-height-base);
      margin-bottom: var(--space-xl);
    }

    .project-content__body p + p {
      margin-top: var(--space-md);
    }

    /* Archive link */
    .archive-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-muted);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      align-self: flex-start;
      transition:
        color var(--transition-fast),
        border-color var(--transition-fast),
        background-color var(--transition-fast);
    }

    .archive-link::after {
      content: '→';
      font-size: 0.85em;
    }

    .archive-link:hover {
      color: var(--color-accent);
      border-color: var(--color-accent);
      background-color: var(--color-accent-soft);
    }

    /* Placeholder — no active project */
    .project-placeholder {
      padding: var(--space-xl) 0;
    }

    .project-placeholder > p {
      font-size: var(--font-size-base);
      color: var(--color-muted-light);
      margin-bottom: var(--space-xl);
    }

    /* ============================================================
       Right column — Etsy + Free Models stacked
       ============================================================ */

    .originals-rail {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Each rail section */
    .rail-section {
      padding-block: var(--space-xl);
    }

    .rail-section + .rail-section {
      border-top: 1px solid var(--color-border-soft);
    }

    /* On mobile, add top border to visually separate rail from left column */
    .originals-main + .originals-rail {
      border-top: 1px solid var(--color-border-soft);
      padding-top: var(--space-xl);
    }

    @media (min-width: 1024px) {
      .originals-main + .originals-rail {
        border-top: none;
        padding-top: 0;
      }
    }

    /* Rail section header: eyebrow + heading left, CTA right */
    .rail-section__header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }

    .rail-section__heading {
      font-size: clamp(var(--font-size-base), 1.5vw, var(--font-size-lg));
      font-weight: var(--font-weight-black);
      letter-spacing: -0.01em;
      color: var(--color-text);
      margin-top: var(--space-xs);
      margin-bottom: 0;
    }

    /* Compact CTA button for rail sections */
    .btn--outline {
      display: inline-flex;
      align-items: center;
      padding: var(--space-xs) var(--space-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-muted);
      background: transparent;
      white-space: nowrap;
      flex-shrink: 0;
      transition:
        border-color var(--transition-fast),
        color var(--transition-fast),
        background-color var(--transition-fast);
    }

    .btn--outline:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background-color: var(--color-accent-soft);
    }

    /* ============================================================
       Etsy scroll rail
       ============================================================ */

    /* Mobile: bleed to page edges; Desktop: contained in right column */
    .etsy-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-inline: calc(-1 * var(--space-lg));
      padding-inline: var(--space-lg);
      padding-bottom: var(--space-xs);
    }

    .etsy-scroll-wrapper::-webkit-scrollbar { display: none; }

    @media (min-width: 1024px) {
      .etsy-scroll-wrapper {
        margin-inline: 0;
        padding-inline: 0;
      }
    }

    .etsy-scroll-track {
      display: flex;
      gap: var(--space-sm);
      width: max-content;
    }

    /* Mobile card width */
    .etsy-scroll-track .product-card {
      width: 176px;
      flex-shrink: 0;
    }

    /* Desktop: narrower right column — show ~2 cards with peek */
    @media (min-width: 1024px) {
      .etsy-scroll-track .product-card {
        width: 156px;
      }
    }

    /* ============================================================
       Free Models scroll rail (mirrors Etsy)
       ============================================================ */

    .free-models-grid {
      display: flex;
      gap: var(--space-sm);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-inline: calc(-1 * var(--space-lg));
      padding-inline: var(--space-lg);
      padding-bottom: var(--space-xs);
    }

    .free-models-grid::-webkit-scrollbar { display: none; }

    @media (min-width: 1024px) {
      .free-models-grid {
        margin-inline: 0;
        padding-inline: 0;
      }
    }

    .free-models-grid .product-card {
      width: 176px;
      flex-shrink: 0;
    }

    @media (min-width: 1024px) {
      .free-models-grid .product-card {
        width: 156px;
      }
    }

    /* ============================================================
       Empty / error state
       ============================================================ */

    .empty-state {
      padding: var(--space-lg);
      text-align: center;
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-muted);
      font-size: var(--font-size-sm);
    }

    /* Inline empty state for rail sections (Etsy, Free Models) */
    .rail-empty-state {
      font-size: var(--font-size-sm);
      color: var(--color-muted-light);
      font-style: italic;
      margin: 0;
      padding-block: var(--space-sm);
    }

    .rail-empty-state a {
      color: var(--color-accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

  <!-- ======================================================
       Header
       ====================================================== -->
  <header class="site-header">

    <div class="header-logo-row">

          <span class="logo__sub">Studio</span>
        </span>
      </a>

      <button class="hamburger"
              aria-label="Toggle menu"
              aria-expanded="false"
              aria-controls="mobile-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Desktop nav -->
    <nav class="header-nav" aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="/originals/"  class="nav-link nav-link--active" aria-current="page">Originals</a></li>
        <li><a href="/#studio"     class="nav-link">The Studio</a></li>
        <li><a href="/heritage/"   class="nav-link">Heritage</a></li>
      </ul>
    </nav>

    <!-- Mobile nav drawer -->
    <nav class="mobile-nav" id="mobile-nav" aria-hidden="true" aria-label="Mobile navigation">
      <ul class="mobile-nav-list">
        <li><a href="/originals/"  class="nav-link" aria-current="page">Originals</a></li>
        <li><a href="/#studio"     class="nav-link">The Studio</a></li>
        <li><a href="/heritage/"   class="nav-link">Heritage</a></li>
      </ul>
    </nav>

  </header>

  <!-- ======================================================
       Main
       ====================================================== -->
  <main>

    <div class="originals-desktop-layout">

      <!-- ---- Left column: Current Project ---- -->
      <section class="originals-main" aria-labelledby="current-project-label">
        <span class="section-label" id="current-project-label">Current Project</span>
        <div id="current-project">
          <!-- Populated by js/components/originals-page.js -->
        </div>
      </section>

      <!-- ---- Right column: Etsy + Free Models stacked ---- -->
      <div class="originals-rail">

        <!-- Etsy Preview -->
        <section id="originals-etsy" class="rail-section" aria-labelledby="etsy-heading">
          <div class="rail-section__header">
            <div>
              <span class="section-label" id="etsy-eyebrow">GACHAFRUIT ON ETSY</span>
              <h2 class="rail-section__heading" id="etsy-heading">Shop Our Originals</h2>
            </div>
            <a href="/explore-all/" class="btn--outline" id="etsy-see-all">See All</a>
          </div>
          <div class="etsy-scroll-wrapper">
            <div class="etsy-scroll-track" id="etsy-scroll-track">
              <!-- Populated by js/components/originals-page.js -->
            </div>
          </div>
        </section>

        <!-- Free Models -->
        <section id="free-models" class="rail-section" aria-labelledby="free-models-heading">
          <div class="rail-section__header">
            <div>
              <span class="section-label">FREE MODELS</span>
              <h2 class="rail-section__heading" id="free-models-heading">Browse the Community Archive</h2>
            </div>
          </div>
          <div class="free-models-grid" id="free-models-grid">
            <!-- Populated by js/components/originals-page.js -->
          </div>
        </section>

      </div><!-- /originals-rail -->

    </div><!-- /originals-desktop-layout -->

  </main>

  <!-- ======================================================
       Footer
       ====================================================== -->
  <footer class="site-footer">
    <div class="footer-inner">

      <p class="footer-copy">
        &copy; 2026 <strong>Gachafruit</strong> &middot; Tulsa, Oklahoma
      </p>

      <nav class="footer-links" aria-label="Marketplace links">
        <a href="https://www.etsy.com/shop/Gachafruit" class="footer-link">Etsy</a>
        <a href="#" class="footer-link">Amazon</a>
      </nav>

      <div class="footer-right">
        <nav class="footer-social" aria-label="Social links">
          <a href="https://www.instagram.com/gachafruitstudio" class="footer-social__link">Instagram</a>
          <a href="https://www.youtube.com/@GachafruitStudio"  class="footer-social__link">YouTube</a>
        </nav>

        <form class="footer-newsletter" aria-label="Newsletter signup">
          <label for="newsletter-email" class="sr-only">Email address</label>
          <input
            type="email"
            id="newsletter-email"
            name="email"
            class="newsletter-input"
            placeholder="Email address"
            autocomplete="email"
          >
          <button type="submit" class="newsletter-btn">Sign Up</button>
        </form>
      </div>

    </div>
  </footer>

  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/card-builder.js" defer></script>
  <script src="../js/components/originals-page.js" defer></script>

</body>
