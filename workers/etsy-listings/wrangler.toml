name            = "gachafruit-etsy-listings"
main            = "index.js"
compatibility_date = "2024-09-23"

# ── Non-sensitive configuration vars ──────────────────────────────────────────
# ETSY_SHOP_ID: The numeric Etsy shop ID for Gachafruit.
#   To find it: GET https://openapi.etsy.com/v3/application/shops?shop_name=Gachafruit
#   (requires x-api-key header) — copy the `shop_id` field from the response.
#
# ALLOWED_ORIGINS: Comma-separated list of origins permitted to call this Worker.
#   The incoming Origin header must exactly match one of these values.
#   The Worker echoes back only the matched origin — never a wildcard.
#   To add a local preview origin, append it to the list (no trailing spaces).
#   Example:  "https://gachafruit.com,http://localhost:5500,http://192.168.1.127:5500"
[vars]
ETSY_SHOP_ID    = "60260227"
ALLOWED_ORIGINS = "https://gachafruit.com,http://localhost:5500,http://192.168.1.127:5500"

# ── Secrets (never stored here — set via CLI) ──────────────────────────────────
# After deploying, run:
#   wrangler secret put ETSY_API_KEY
# Then paste your Etsy API key when prompted.
# The secret is encrypted at rest in Cloudflare and is NEVER in this file.

# ── Custom route (optional) ───────────────────────────────────────────────────
# Uncomment and update if you want the Worker on your own domain instead of
# *.workers.dev. The Cloudflare Pages site and the Worker must be on the same
# Cloudflare account zone.
#
# [[routes]]
# pattern = "gachafruit.com/api/listings"
# zone_name = "gachafruit.com"
